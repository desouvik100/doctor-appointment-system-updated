services:
  # Backend API Service
  - type: web
    name: healthsync-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5005

      # ── Database ──────────────────────────────────────────────────────────
      # Set MONGODB_URI in Render Dashboard → Environment (it contains credentials)
      - key: MONGODB_URI
        sync: false

      # ── Auth ──────────────────────────────────────────────────────────────
      # Set JWT_SECRET in Render Dashboard → Environment
      - key: JWT_SECRET
        sync: false

      # ── CORS / URLs ───────────────────────────────────────────────────────
      - key: FRONTEND_URL
        value: https://healthsyncpro.in
      - key: CORS_ORIGIN
        value: https://healthsyncpro.in
      - key: BACKEND_URL
        value: https://doctor-appointment-system-updated.onrender.com

      # ── Email ─────────────────────────────────────────────────────────────
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: HealthSync <no-reply@healthsyncpro.in>
      - key: ADMIN_EMAIL
        sync: false

      # ── AI ────────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini

      # ── Google Meet / OAuth ───────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://doctor-appointment-system-updated.onrender.com/api/google/callback

      # ── Payments ──────────────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_MODE
        value: live
      - key: USE_RAZORPAY_PAYMENTS
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── SMS / WhatsApp ────────────────────────────────────────────────────
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_SENDER_ID
        value: HLTHSN
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: healthsync_whatsapp_verify

      # ── Cloudinary ────────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Misc ──────────────────────────────────────────────────────────────
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: CURRENCY
        value: INR
      - key: PLATFORM_FEE_PERCENTAGE
        value: "5"
      - key: GST_PERCENTAGE
        value: "0"
      - key: TEST_APPOINTMENT
        value: "false"
